<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        html,body{
            height: 100%;
            margin:0;
        }

        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff 0%, #e3f2fd 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        #header-box, #resultado-box{
            width: min(90%, 450px);
        }

        #header-box{
            border: 2px solid #1e88e5;
            padding: 30px 32px;
            border-radius: 12px;
            background: #ffffff;
            text-align: center;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.15);
            margin-bottom: 30px;
        }
        
        #header-box h1{
            color: #1e88e5;
            margin: 0;
            font-size: 28px;
        }

        #resultado-box{
            text-align: center;
            border: 2px solid #1e88e5;
            border-radius: 12px;
            padding: 28px 24px;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.15);
        }

        #resultado-box p{
            margin: 0 0 20px 0;
            font-size: 16px;
            color: #1565c0;
            font-weight: 500;
        }

        #resultado-box .url-corta{
            background: #e3f2fd;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #bbdefb;
            font-weight: bold;
            color: #1565c0;
            word-break: break-all;
            margin-bottom: 20px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
        }
        
        #resultado-box button{
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #resultado-box button:hover{
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 136, 229, 0.3);
        }

        #resultado-box a{
            display: inline-block;
            padding: 12px 24px;
            margin-top: 8px;
            border: 2px solid #1e88e5;
            border-radius: 8px;
            background: transparent;
            color: #1e88e5;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        #resultado-box a:hover{
            background: #1e88e5;
            color: white;
        }
    </style>
    <meta charset="UTF-8">
    <title>LinkRapid - URL Acortada</title>
</head>
<body>
<div id="header-box">
    <h1>✓ URL Acortada</h1>
</div>

<div id="resultado-box">
    <p>URL generada</p>
    <div class="url-corta" id="urlCorta">http://localhost:5000/{{ url_corta }}</div>
    <button id="copiarBtn" onclick="copiarAlPortapapeles()">📋 Copiar</button>
    <a href="/">Acortar otra URL</a>
</div>

<script>
    function copiarAlPortapapeles() {
        const urlCorta = document.getElementById('urlCorta').textContent;
        navigator.clipboard.writeText(urlCorta).then(() => {
            const btn = document.getElementById('copiarBtn');
            const textoOriginal = btn.textContent;
            btn.textContent = '✓ Copiado!';
            setTimeout(() => {
                btn.textContent = textoOriginal;
            }, 2000);
        });
    }
</script>
</body>
</html>
